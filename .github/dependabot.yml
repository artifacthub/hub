---
version: 2

multi-ecosystem-groups:
  backend:
    schedule:
      interval: "monthly"
  frontend:
    schedule:
      interval: "monthly"
  infra:
    schedule:
      interval: "monthly"

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "backend"
    ignore:
      - dependency-name: "k8s.io/apimachinery"
      - dependency-name: "k8s.io/client-go"

  - package-ecosystem: "npm"
    directory: "/web"
    patterns:
      - "*"
    multi-ecosystem-group: "frontend"

  - package-ecosystem: "npm"
    directory: "/widget"
    patterns:
      - "*"
    multi-ecosystem-group: "frontend"

  - package-ecosystem: "docker"
    directory: "/cmd/ah"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"

  - package-ecosystem: "docker"
    directory: "/cmd/hub"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"
    ignore:
      - dependency-name: "node"
        versions:
          - "19-alpine3.19"
          - "20-alpine3.19"
          - "21-alpine3.19"
          - "22-alpine3.19"
          - "22-alpine3.20"
          - "23-alpine3.21"

  - package-ecosystem: "docker"
    directory: "/cmd/scanner"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"

  - package-ecosystem: "docker"
    directory: "/cmd/tracker"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"

  - package-ecosystem: "docker"
    directory: "/database/migrations"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "infra"
